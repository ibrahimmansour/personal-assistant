<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f2937" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a5b4fc" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>
  </defs>
  <!-- Rounded background -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)" />
  <!-- Three subtle widget dots in the upper-right (suggests dashboard) -->
  <circle cx="372" cy="96" r="14" fill="#6366f1" opacity="0.5" />
  <circle cx="412" cy="96" r="14" fill="#6366f1" opacity="0.7" />
  <circle cx="452" cy="96" r="14" fill="#a5b4fc" />
  <!-- "PA" monogram -->
  <g fill="url(#accent)" font-family="system-ui, -apple-system, 'Helvetica Neue', sans-serif" font-weight="700" font-size="280" text-anchor="middle">
    <text x="256" y="350">PA</text>
  </g>
</svg>
