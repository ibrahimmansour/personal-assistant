# tmux configuration for personal-assistant PTY sessions.
# Used automatically by pty-server.mjs when spawning tmux-wrapped sessions.

# Scrollback & mouse
set -g history-limit 100000
set -g mouse on

# No status bar (saves terminal space inside widget)
set -g status off

# Fast escape (no delay after pressing Esc)
set -g escape-time 0

# Proper color support
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Don't rename windows automatically
set -g allow-rename off

# When the command inside a pane exits, destroy the pane/session
# (default behavior — no remain-on-exit)
set -g remain-on-exit off
